<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>♥ صائد القلوب | لعبة حب من أجل حبيبتي ♥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff9a9e 0%, #fad0c4 35%, #fad0c4 70%, #ffdde1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', 'Amiri', 'Courier New', monospace;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* قلوب عائمة في الخلفية (زخرفة) */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-hearts i {
            position: absolute;
            display: block;
            color: rgba(255, 105, 180, 0.25);
            font-size: 24px;
            animation: floatHeart 12s linear infinite;
            bottom: -50px;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.4;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* بطاقة اللعبة الرئيسية */
        .game-container {
            background: rgba(255, 245, 245, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 72px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 8px rgba(255, 215, 215, 0.6), 0 0 0 12px #ffb7c5;
            padding: 20px 20px 30px;
            text-align: center;
            z-index: 10;
            transition: all 0.2s ease;
            width: fit-content;
            max-width: 100%;
        }

        h1 {
            font-size: 2.3rem;
            background: linear-gradient(135deg, #d4145a, #ff6f91);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 12px rgba(255, 200, 200, 0.8);
            margin-bottom: 8px;
            letter-spacing: -1px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        h1 span {
            font-size: 2.8rem;
        }

        .sub {
            color: #c43b68;
            font-weight: bold;
            background: #fff0f0aa;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            backdrop-filter: blur(2px);
        }

        canvas {
            display: block;
            margin: 10px auto;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2), inset 0 0 20px rgba(255, 255, 200, 0.5);
            cursor: grab;
            background: #fee9e6;
            width: 100%;
            height: auto;
            border: 3px solid #ffbfcc;
        }

        canvas:active {
            cursor: grabbing;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 20px;
            background: #ffeff3dd;
            padding: 12px 24px;
            border-radius: 100px;
            margin: 15px 15px 10px;
            backdrop-filter: blur(5px);
        }

        .score-box {
            background: #ff7e9e;
            padding: 6px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1.8rem;
            min-width: 120px;
            box-shadow: inset 0 -2px 0 #b13e5e, 0 8px 14px rgba(0,0,0,0.1);
        }

        .score-box span {
            font-size: 1rem;
            display: block;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .love-message {
            background: #fff0f0;
            padding: 10px 22px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #b83b5e;
            max-width: 280px;
            box-shadow: 0 5px 12px #ffb7c2;
            transition: all 0.2s ease;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
        }

        .love-message i {
            font-style: normal;
            display: inline-block;
            animation: heartbeat 1.2s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); color: #ff3366; }
        }

        .progress-area {
            margin: 10px 20px;
            text-align: right;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: bold;
            color: #a13e5c;
            margin-bottom: 5px;
        }

        .progress-bar {
            background-color: #ffe2e7;
            border-radius: 40px;
            height: 14px;
            width: 100%;
            overflow: hidden;
            box-shadow: inset 0 1px 3px #c28f9b;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff758c, #ff4d6d);
            border-radius: 40px;
            transition: width 0.2s ease;
            box-shadow: 0 0 8px #ff99aa;
        }

        button {
            background: linear-gradient(95deg, #ff6680, #ff3366);
            border: none;
            padding: 12px 28px;
            margin-top: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 0 #a12246;
            font-family: inherit;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #a12246;
        }

        .controls-info {
            font-size: 0.8rem;
            background: #ffd9e2aa;
            border-radius: 50px;
            padding: 8px 18px;
            display: inline-flex;
            align-items: center;
            gap: 18px;
            margin-top: 12px;
            color: #b13e5e;
            font-weight: 600;
        }

        footer {
            font-size: 0.7rem;
            margin-top: 15px;
            color: #d96c8a;
        }

        @media (max-width: 680px) {
            .game-container {
                padding: 15px;
            }
            .score-box {
                font-size: 1.4rem;
                min-width: 90px;
                padding: 4px 16px;
            }
            .love-message {
                font-size: 0.9rem;
                padding: 6px 16px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="game-container">
    <h1>
        <span>❤️</span> صائد القلوب <span>❤️</span>
    </h1>
    <div class="sub">♥ لأجمل حبيبة في الوجود ♥</div>

    <canvas id="loveCanvas" width="800" height="500" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/500"></canvas>

    <div class="score-panel">
        <div class="score-box">
            <span>♥ نقاط الحب ♥</span>
            <span id="scoreValue">0</span>
        </div>
        <div class="love-message" id="loveMessageBox">
            <i>💖</i> امسكي القلوب بحبك <i>💖</i>
        </div>
    </div>

    <div class="progress-area">
        <div class="progress-label">
            <span>✨ عداد الحب ✨</span>
            <span id="levelText">مستوى : عاشق مبتدئ</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="loveProgressFill"></div>
        </div>
    </div>

    <button id="resetGameBtn">
        💘 ابدأ من جديد 💘
    </button>
    <div class="controls-info">
        <span>🖱️ حرك الفأرة / إصبعك</span>
        <span>❤️ امسكي القلوب العادية والذهبية ❤️</span>
    </div>
    <footer>كل قلب يزيد حبي لكِ إلى الأبد</footer>
</div>

<script>
    (function(){
        // ------------------- عناصر اللعبة -------------------
        const canvas = document.getElementById('loveCanvas');
        const ctx = canvas.getContext('2d');
        
        // أبعاد canvas ثابتة (800*500)
        canvas.width = 800;
        canvas.height = 500;
        
        // متغيرات اللعبة
        let hearts = [];            // مصفوفة القلوب المتساقطة
        let score = 0;
        let baseSpeed = 2.2;        // سرعة السقوط الأساسية
        let currentGlobalSpeed = baseSpeed;
        let maxSpeed = 6.2;
        let catcherWidth = 82;
        let catcherHeight = 82;
        let catcherX = (canvas.width/2) - (catcherWidth/2);
        let catcherY = canvas.height - catcherHeight - 8;
        
        // حالة اللعبة
        let animationId = null;
        let spawnInterval = null;
        let gameActive = true;
        
        // حد أقصى للقلوب على الشاشة
        const MAX_HEARTS_ON_SCREEN = 24;
        
        // رسائل حب عشوائية عند الإمساك بقلب
        const loveMessages = [
            "💗 أنتِ نبض قلبي 💗", "🌹 أحبك أكثر من كل شيء 🌹", "💕 أنتِ حلمي الجميل 💕",
            "✨ معكِ الدنيا حب ✨", "🍬 حبك يساوي الدنيا كلها 🍬", "💖 أنتِ فرحة عمري 💖",
            "🌟 كل قلب يذكرني بكِ 🌟", "🌸 أنتِ أجمل هدية 🌸", "💘 أشتاق إليكِ بشغف 💘",
            "🍭 حبيبتي أنتِ السعادة 🍭", "✨ قبلة على قلبك ✨", "💞 أتنفس حبكِ 💞"
        ];
        
        // عناصر DOM
        const scoreSpan = document.getElementById('scoreValue');
        const loveMessageBox = document.getElementById('loveMessageBox');
        const resetBtn = document.getElementById('resetGameBtn');
        const progressFill = document.getElementById('loveProgressFill');
        const levelTextSpan = document.getElementById('levelText');
        
        // مستويات الحب
        const loveLevels = [
            { min: 0, name: "🌱 بذور الحب 🌱", percentCap: 15 },
            { min: 15, name: "💕 بداية الغرام 💕", percentCap: 30 },
            { min: 30, name: "🌸 قلب ينبض بالحب 🌸", percentCap: 50 },
            { min: 50, name: "🔥 عشق لا يوصف 🔥", percentCap: 70 },
            { min: 70, name: "👑 مملكة الحب 👑", percentCap: 90 },
            { min: 90, name: "♾️ حب أبدي ♾️", percentCap: 120 }
        ];
        
        // دالة تحديث مستوى الحب وشريط التقدم بناءً على النقاط
        function updateLoveProgress() {
            let currentLevel = loveLevels[0];
            let nextCap = 120; // افتراضي
            for(let i=0; i<loveLevels.length; i++) {
                if(score >= loveLevels[i].min) {
                    currentLevel = loveLevels[i];
                    if(i+1 < loveLevels.length) nextCap = loveLevels[i+1].min;
                    else nextCap = loveLevels[i].percentCap;
                } else break;
            }
            // نسبة التقدم بين المستوى الحالي والمستوى التالي
            let levelStart = currentLevel.min;
            let levelEnd = nextCap;
            let progressPercent = 0;
            if(score >= levelEnd) {
                progressPercent = 100;
            } else if(score <= levelStart) {
                progressPercent = 0;
            } else {
                progressPercent = ((score - levelStart) / (levelEnd - levelStart)) * 100;
            }
            progressFill.style.width = Math.min(100, Math.max(0, progressPercent)) + '%';
            levelTextSpan.innerHTML = currentLevel.name + `  (${score} ❤️)`;
        }
        
        // عرض رسالة حب عابرة
        function showLoveMessage(customMsg = null) {
            let msg;
            if(customMsg) msg = customMsg;
            else {
                let randomIndex = Math.floor(Math.random() * loveMessages.length);
                msg = loveMessages[randomIndex];
            }
            loveMessageBox.innerHTML = `<i>💘</i> ${msg} <i>💘</i>`;
            // إضافة تأثير وميض سريع
            loveMessageBox.style.transform = "scale(1.05)";
            setTimeout(() => { loveMessageBox.style.transform = "scale(1)"; }, 200);
        }
        
        // تحديث سرعة اللعبة بناءً على النقاط (تزداد الصعوبة)
        function updateDifficultySpeed() {
            let newSpeed = baseSpeed + Math.floor(score / 12) * 0.28;
            if(newSpeed > maxSpeed) newSpeed = maxSpeed;
            currentGlobalSpeed = parseFloat(newSpeed.toFixed(2));
        }
        
        // إضافة نقاط ورسائل مميزة
        function addPoints(amount, isSpecial = false, heartX = null, heartY = null) {
            score += amount;
            scoreSpan.innerText = score;
            updateLoveProgress();
            updateDifficultySpeed();
            
            // رسالة مناسبة للقلب الذهبي أو العادي
            if(isSpecial) {
                showLoveMessage(`✨ قلب ذهبي! +${amount} نقطة حب ✨ أنتِ سحر حياتي ✨`);
                // تأثير بصري إضافي
                createFloatingEffect(heartX, heartY, "+"+amount+" 💛");
            } else {
                let randomMsg = loveMessages[Math.floor(Math.random() * loveMessages.length)];
                showLoveMessage(randomMsg + ` (+${amount})`);
                if(heartX) createFloatingEffect(heartX, heartY, "+"+amount);
            }
            
            // احتفال خاص عند الوصول لنقاط معينة
            if(score === 15) showLoveMessage("💎 15 قلباً! أنتِ مصدر فرحتي 💎");
            if(score === 30) showLoveMessage("🎉 30 نقطة حب! قلبي ينبض باسمكِ 🎉");
            if(score === 50) showLoveMessage("🏆 50 نقطة! أنتِ أعظم هدية في حياتي 🏆");
            if(score === 70) showLoveMessage("💎✨ مملكة الحب اكتملت، أحبكِ إلى الأبد ✨💎");
            if(score === 100) showLoveMessage("💖💖 100 قلب! أنتِ حبي الأبدي 💖💖");
        }
        
        // تأثير عائم +1 عند الإمساك
        function createFloatingEffect(x, y, text) {
            if(!x || !y) return;
            // سيتم التعامل معه عبر رسم مؤقت في اللوحة, نقوم بإضافة عنصر مؤقت لكننا نفضل بسيط: نعرض رسالة.
            // عمل تأثير رسومي إضافي صغير يمكن تجاهله للبساطة, لكن نضيف تأثير جانبي لطيف
        }
        
        // دالة رسم قلب (عام) - رسم قلوب جميلة
        function drawHeart(ctx, x, y, size, color, isGold = false) {
            ctx.save();
            ctx.shadowBlur = 6;
            ctx.shadowColor = "rgba(0,0,0,0.2)";
            ctx.beginPath();
            const topCurveHeight = size * 0.3;
            const width = size * 0.9;
            const height = size * 0.85;
            // رسم قلب بإستخدام بيزير
            ctx.moveTo(x, y - topCurveHeight);
            ctx.bezierCurveTo(x - width/2, y - height/2, x - width, y + topCurveHeight/2, x, y + height);
            ctx.bezierCurveTo(x + width, y + topCurveHeight/2, x + width/2, y - height/2, x, y - topCurveHeight);
            ctx.closePath();
            
            if(isGold) {
                let grad = ctx.createLinearGradient(x-10, y-8, x+12, y+12);
                grad.addColorStop(0, '#FFD966');
                grad.addColorStop(1, '#FFB347');
                ctx.fillStyle = grad;
                ctx.shadowColor = "#ffaa33";
            } else {
                let grad = ctx.createLinearGradient(x-6, y-6, x+8, y+10);
                grad.addColorStop(0, color || '#ff4d6d');
                grad.addColorStop(1, '#ff1e4d');
                ctx.fillStyle = grad;
            }
            ctx.fill();
            ctx.shadowBlur = 2;
            ctx.strokeStyle = "#fff9e0";
            ctx.lineWidth = 1.2;
            ctx.stroke();
            // إضافة بريق للقلب الذهبي
            if(isGold){
                ctx.beginPath();
                ctx.arc(x-3, y-4, 2, 0, Math.PI*2);
                ctx.fillStyle = "#FFF5b0";
                ctx.fill();
            }
            ctx.restore();
        }
        
        // رسم القلب الكبير (الماسك)
        function drawCatcherHeart(x, y, w, h) {
            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = "rgba(255, 80, 120, 0.7)";
            // نبض خفيف
            let pulse = Math.sin(Date.now() * 0.008) * 0.03;
            let scaleW = w * (1 + pulse*0.03);
            let scaleH = h * (1 + pulse*0.03);
            let offsetX = (w - scaleW)/2;
            let offsetY = (h - scaleH)/2;
            ctx.beginPath();
            const centerX = x + w/2;
            const centerY = y + h/2;
            const heartW = scaleW * 0.85;
            const heartH = scaleH * 0.9;
            ctx.moveTo(centerX, centerY - heartH*0.3);
            ctx.bezierCurveTo(centerX - heartW/2, centerY - heartH/1.7, centerX - heartW, centerY + heartH*0.15, centerX, centerY + heartH*0.8);
            ctx.bezierCurveTo(centerX + heartW, centerY + heartH*0.15, centerX + heartW/2, centerY - heartH/1.7, centerX, centerY - heartH*0.3);
            ctx.closePath();
            let grad = ctx.createLinearGradient(centerX-20, centerY-15, centerX+20, centerY+20);
            grad.addColorStop(0, '#ff88aa');
            grad.addColorStop(1, '#e63e6b');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.shadowBlur = 6;
            ctx.strokeStyle = "#ffe0e7";
            ctx.lineWidth = 2.5;
            ctx.stroke();
            // قلب صغير داخلي
            ctx.beginPath();
            ctx.arc(centerX-3, centerY-2, 4, 0, Math.PI*2);
            ctx.fillStyle = "#FFF0d0";
            ctx.fill();
            ctx.restore();
        }
        
        // رسم جميع العناصر
        function draw() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // خلفية رومانسية مع تدرج وقلوب صغيرة مرسومة
            let gradBack = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradBack.addColorStop(0, '#fff0f2');
            gradBack.addColorStop(1, '#ffe4e9');
            ctx.fillStyle = gradBack;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // رسم دوائر ضبابية
            for(let i=0;i<8;i++){
                ctx.beginPath();
                ctx.arc(70 + i*110, 80 + Math.sin(Date.now()*0.002 + i)*15, 35, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,200,210,0.2)";
                ctx.fill();
            }
            
            // رسم القلوب المتساقطة
            for(let heart of hearts) {
                let isSpecialHeart = heart.type === 'special';
                let heartColor = isSpecialHeart ? '#f5bc70' : '#ff4d6d';
                drawHeart(ctx, heart.x, heart.y, heart.size || 20, heartColor, isSpecialHeart);
                if(isSpecialHeart){
                    ctx.beginPath();
                    ctx.arc(heart.x-2, heart.y-3, 3, 0, Math.PI*2);
                    ctx.fillStyle = "#FFE484";
                    ctx.fill();
                }
            }
            
            // رسم الماسك (القلب الكبير)
            drawCatcherHeart(catcherX, catcherY, catcherWidth, catcherHeight);
            
            // رسوميات إضافية: ورد صغير
            ctx.font = "bold 18px 'Segoe UI'";
            ctx.fillStyle = "#ff8aa8";
            ctx.shadowBlur = 0;
            ctx.fillText("♥", 20, 45);
            ctx.fillText("♥", canvas.width-40, 45);
        }
        
        // تحديث مواقع القلوب ومعالجة الاصطدامات
        function updateGame() {
            if(!gameActive) return;
            // تحديث مواقع القلوب
            for(let i=0; i<hearts.length; i++) {
                hearts[i].y += hearts[i].speed;
            }
            
            // معالجة الاصطدام بالقلب الكبير (الماسك)
            for(let i=hearts.length-1; i>=0; i--) {
                const h = hearts[i];
                // مستطيل التقريب للماسك
                const catcherLeft = catcherX;
                const catcherRight = catcherX + catcherWidth;
                const catcherTop = catcherY;
                const catcherBottom = catcherY + catcherHeight;
                const heartRadius = (h.size || 20)/1.8;
                // تصادم دائرة مع مستطيل
                if( h.x + heartRadius > catcherLeft && h.x - heartRadius < catcherRight &&
                    h.y + heartRadius > catcherTop && h.y - heartRadius < catcherBottom) {
                    // تم الالتقاط
                    let points = (h.type === 'special') ? 3 : 1;
                    addPoints(points, (h.type === 'special'), h.x, h.y);
                    hearts.splice(i,1);
                    continue;
                }
                // تجاوز القاع (خروج)
                if(h.y + heartRadius >= canvas.height) {
                    hearts.splice(i,1);
                    // لا يوجد خصم نقاط لتبقى اللعبة إيجابية، فقط رسالة ودودة
                    loveMessageBox.innerHTML = "<i>💔</i> فاتك قلب، لكن حبي ينتظركِ 💔";
                    setTimeout(()=> {
                        if(gameActive) showLoveMessage("♥ استمري في جمع القلوب ♥");
                    }, 800);
                }
            }
            
            // تحديث السرعة العالمية للقلوب الجديدة فقط (القلوب الموجودة تحافظ على سرعتها)
            // لا بأس بذلك، للصعوبة المستمرة
        }
        
        // إضافة قلب جديد بشكل دوري
        function spawnHeart() {
            if(!gameActive) return;
            if(hearts.length >= MAX_HEARTS_ON_SCREEN) return;
            let randX = 20 + Math.random() * (canvas.width - 50);
            let isSpecial = Math.random() < 0.14; // 14% فرصة قلب ذهبي
            let heartSize = isSpecial ? 24 : 19;
            let heartSpeed = currentGlobalSpeed + (Math.random() * 0.7 - 0.2);
            if(heartSpeed < 1.8) heartSpeed = 1.8;
            hearts.push({
                x: randX,
                y: -15,
                size: heartSize,
                speed: heartSpeed,
                type: isSpecial ? 'special' : 'normal'
            });
        }
        
        // ----- التعامل مع حركة الماسك (ماوس/لمس) -----
        function handleMove(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;   // تحويل الإحداثيات إلى canvas pixel
            let canvasX = (clientX - rect.left) * scaleX;
            if(canvasX < 0) canvasX = 0;
            if(canvasX > canvas.width - catcherWidth) canvasX = canvas.width - catcherWidth;
            catcherX = canvasX;
        }
        
        function onMouseMove(e) {
            e.preventDefault();
            handleMove(e.clientX, e.clientY);
        }
        
        function onTouchMove(e) {
            e.preventDefault();
            if(e.touches.length) {
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }
        
        function onTouchStart(e) {
            e.preventDefault();
            if(e.touches.length) {
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }
        
        // ----- حلقة الرسم الرئيسية -----
        function gameLoop() {
            if(!gameActive) return;
            updateGame();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ----- بدء المؤقتات -----
        function startSpawner() {
            if(spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(() => {
                if(gameActive) spawnHeart();
            }, 780);
        }
        
        // ----- إعادة ضبط اللعبة بالكامل -----
        function resetGame() {
            gameActive = false;
            // إيقاف كل شيء
            if(animationId) cancelAnimationFrame(animationId);
            if(spawnInterval) clearInterval(spawnInterval);
            // إعادة المتغيرات
            hearts = [];
            score = 0;
            currentGlobalSpeed = baseSpeed;
            scoreSpan.innerText = "0";
            catcherX = (canvas.width/2) - (catcherWidth/2);
            updateLoveProgress();
            updateDifficultySpeed();
            showLoveMessage("💖 بداية جديدة مع حبيبتي 💖");
            // إعادة التشغيل
            gameActive = true;
            startSpawner();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ----- إضافة مستمعي الأحداث -----
        function bindEvents() {
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('touchmove', onTouchMove, { passive: false });
            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('touchcancel', (e) => {});
            window.addEventListener('resize', () => {}); // لا حاجة لإعادة قياس canvas ثابت
        }
        
        // ----- تهيئة اللعبة -----
        function init() {
            bindEvents();
            resetGame(); // يبدأ اللعبة بشكل نظيف
        }
        
        // زر الإعادة
        resetBtn.addEventListener('click', () => {
            resetGame();
        });
        
        // إنشاء قلوب عائمة في الخلفية
        function createBackgroundHearts() {
            const container = document.getElementById('floatingHearts');
            for(let i=0;i<22;i++) {
                let heartSpan = document.createElement('i');
                heartSpan.innerHTML = ['❤️','💖','💗','💘','💝','❤️‍🔥','💕'][Math.floor(Math.random()*7)];
                heartSpan.style.left = Math.random() * 100 + '%';
                heartSpan.style.animationDuration = 8 + Math.random() * 12 + 's';
                heartSpan.style.animationDelay = Math.random() * 15 + 's';
                heartSpan.style.fontSize = 18 + Math.random() * 40 + 'px';
                container.appendChild(heartSpan);
            }
        }
        createBackgroundHearts();
        
        // بدء التشغيل
        init();
    })();
</script>
</body>
</html>
