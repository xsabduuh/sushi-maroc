<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💝</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ========== CSS Variables ========== */
        :root {
            --background-color-1: #ffafbd;
            --background-color-2: #ffc3a0;
            --button-color: #ff6b6b;
            --button-hover: #ff8787;
            --text-color: #ff4757;
            --float-duration: 15s;
            --float-distance: 50px;
            --bounce-speed: 0.5s;
            --heart-explosion-size: 1.5;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--background-color-1), var(--background-color-2));
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            margin: 20px;
            overflow: visible !important;
        }

        .floating-elements {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart, .bear {
            position: absolute;
            font-size: 2rem;
            animation: float var(--float-duration) linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
            }
            100% {
                transform: translateY(-100px) translateX(var(--float-distance));
            }
        }

        .cute-btn {
            background: var(--button-color);
            border: none;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 20px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }

        .cute-btn:hover {
            transform: scale(1.1);
            background: var(--button-hover);
        }

        .hidden {
            display: none;
        }

        .disabled-btn {
            opacity: 0.7;
            cursor: not-allowed;
            pointer-events: none;
        }

        .secret-answer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            margin-top: 0;
            opacity: 0.2;
            transition: opacity 0.3s;
            transform: scale(0.7);
            z-index: 2;
            animation: subtle-hint 2s infinite alternate;
            animation-delay: 5s;
        }

        .secret-answer .cute-btn {
            font-size: 0.8rem;
            padding: 5px 10px;
        }

        .secret-answer:hover {
            opacity: 1;
            animation: none;
        }

        .love-meter {
            position: relative;
            width: 100%;
            margin: 20px auto;
            overflow: visible;
            padding: 10px 0;
        }

        .love-meter p {
            font-size: 1.2em;
            margin: 15px 0;
            color: var(--text-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .slider {
            width: 100%;
            height: 25px;
            background: linear-gradient(to right, #ff6b6b, #ff8787, #ffb8b8);
            -webkit-appearance: none;
            appearance: none;
            outline: none;
            position: relative;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.2);
            transition: all 0.3s ease;
        }

        .slider:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.3);
        }

        .slider::-webkit-slider-runnable-track,
        .slider::-moz-range-track {
            width: 100%;
            height: 25px;
            background: linear-gradient(to right, #ff6b6b, #ff8787, #ffb8b8);
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #ff4757, #ff6b6b);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(255, 71, 87, 0.3);
            position: relative;
            z-index: 10;
            margin-top: -5px;
            border: 3px solid white;
            transition: all 0.2s ease;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        .slider::-moz-range-thumb {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #ff4757, #ff6b6b);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(255, 71, 87, 0.3);
            position: relative;
            z-index: 10;
            border: 3px solid white;
            transition: all 0.2s ease;
        }

        .slider::-moz-range-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        #extraLove {
            color: #ff6b6b;
            font-weight: bold;
            animation: bounce 0.5s infinite alternate;
            display: block;
            padding: 5px 10px;
            border-radius: 10px;
            background: rgba(255, 107, 107, 0.1);
            text-shadow: 0 2px 4px rgba(255, 71, 87, 0.2);
            transition: all 0.3s ease;
            margin-top: 5px;
        }

        #extraLove.super-love {
            background: rgba(255, 107, 107, 0.2);
            font-size: 1.2em;
            padding: 8px 15px;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.2);
        }

        #loveValue {
            font-weight: bold;
            color: #ff4757;
            font-size: 1.3em;
            transition: all 0.3s ease;
        }

        .love-value-container {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .hearts-explosion {
            font-size: 2rem;
            animation: explode 1s ease-out forwards;
            margin-top: 30px;
        }

        @keyframes explode {
            0% { transform: scale(0); }
            50% { transform: scale(var(--heart-explosion-size)); }
            100% { transform: scale(1); }
        }

        h1, h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
        }

        h1 {
            color: #ff6b6b;
            margin-bottom: 2rem;
        }

        h2 {
            color: #ff8787;
        }

        .super-love {
            font-size: 1.5em;
            color: #ff4757;
            font-weight: bold;
            transform: scale(1.2);
            display: inline-block;
            text-shadow: 2px 2px 4px rgba(255, 71, 87, 0.3);
        }

        .celebration-text {
            font-size: 3em;
            color: #ff4757;
            font-weight: bold;
            margin: 30px 0;
            animation: bounce var(--bounce-speed) infinite alternate;
            text-shadow: 2px 2px 4px rgba(255, 71, 87, 0.3);
        }

        @keyframes subtle-hint {
            0% { opacity: 0.2; }
            100% { opacity: 0.3; }
        }

        .music-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .music-btn {
            background: var(--button-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .music-btn:hover {
            transform: scale(1.05);
            background: var(--button-hover);
        }
    </style>
</head>
<body>
    <div class="floating-elements"></div>

    <div class="container">
        <h1 id="valentineTitle"></h1>

        <div id="musicControls" class="music-controls">
            <button id="musicToggle" class="music-btn">🎵 Play Music</button>
            <audio id="bgMusic" loop>
                <source id="musicSource" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="question-section" id="question1">
            <h2 id="question1Text"></h2>
            <button class="cute-btn" onclick="moveButton(this)" id="yesBtn1"></button>
            <button class="cute-btn" onclick="moveButton(this)" id="noBtn1"></button>
            <div class="secret-answer">
                <button class="cute-btn special" onclick="showNextQuestion(2)" id="secretAnswerBtn"></button>
            </div>
        </div>

        <div class="question-section hidden" id="question2">
            <h2 id="question2Text"></h2>
            <div class="love-meter">
                <input type="range" min="0" max="10000" value="100" class="slider" id="loveMeter">
                <p>
                    <span class="love-value-container"><span id="startText"></span> (<span id="loveValue">100</span>%)</span>
                    <span id="extraLove" class="hidden"></span>
                </p>
            </div>
            <button class="cute-btn" onclick="showNextQuestion(3)" id="nextBtn"></button>
        </div>

        <div class="question-section hidden" id="question3">
            <h2 id="question3Text"></h2>
            <button class="cute-btn final-yes" onclick="celebrate()" id="yesBtn3"></button>
            <button class="cute-btn" onclick="moveButton(this)" id="noBtn3"></button>
        </div>

        <div class="celebration hidden" id="celebration">
            <h2 id="celebrationTitle"></h2>
            <p class="celebration-text" id="celebrationMessage"></p>
            <p class="celebration-text" id="celebrationEmojis"></p>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION (VALENTINE_CONFIG) ==========
        window.VALENTINE_CONFIG = {
            // CUSTOMIZE: Valentine's name
            valentineName: "My Love",
            
            // CUSTOMIZE: Page title
            pageTitle: "Will You Be My Valentine? 💝",
            
            // CUSTOMIZE: Colors (use valid hex codes)
            colors: {
                backgroundStart: "#ffafbd",
                backgroundEnd: "#ffc3a0",
                buttonBackground: "#ff6b6b",
                buttonHover: "#ff8787",
                textColor: "#ff4757"
            },
            
            // CUSTOMIZE: Animation settings
            animations: {
                floatDuration: "15s",
                floatDistance: "50px",
                bounceSpeed: "0.5s",
                heartExplosionSize: "1.5"
            },
            
            // CUSTOMIZE: Music settings
            music: {
                enabled: true,
                autoplay: false,
                volume: 0.5,
                musicUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // Replace with your own
                startText: "🎵 Play Music",
                stopText: "🔊 Pause Music"
            },
            
            // CUSTOMIZE: Floating emojis (hearts and bears)
            floatingEmojis: {
                hearts: ["❤️", "💖", "💗", "💘", "💝", "💕", "💓"],
                bears: ["🧸", "🐻", "🐻‍❄️", "🐼"]
            },
            
            // CUSTOMIZE: Questions and buttons
            questions: {
                first: {
                    text: "Will you be my Valentine? 💕",
                    yesBtn: "Yes! 💖",
                    noBtn: "No 😢",
                    secretAnswer: "🤫 Secret answer"
                },
                second: {
                    text: "How much do you love me? 💘",
                    startText: "Love Meter",
                    nextBtn: "Next ➡️"
                },
                third: {
                    text: "Will you marry me? 💍",
                    yesBtn: "YES! 💒",
                    noBtn: "No way 😈"
                }
            },
            
            // CUSTOMIZE: Love meter extra messages
            loveMessages: {
                normal: "🤔 Hmm... just 'normal'?",
                high: "💕 Wow! That's a lot of love!",
                extreme: "🔥 INSANE LEVEL! You're crazy about me! 🔥"
            },
            
            // CUSTOMIZE: Celebration messages
            celebration: {
                title: "🎉 YAY! 🎉",
                message: "You made me the happiest person in the world! 💖",
                emojis: "💍❤️🥂💃🕺🎊"
            }
        };

        // ========== THEME APPLIER ==========
        function applyTheme() {
            const config = window.VALENTINE_CONFIG;
            const root = document.documentElement;
            root.style.setProperty('--background-color-1', config.colors.backgroundStart);
            root.style.setProperty('--background-color-2', config.colors.backgroundEnd);
            root.style.setProperty('--button-color', config.colors.buttonBackground);
            root.style.setProperty('--button-hover', config.colors.buttonHover);
            root.style.setProperty('--text-color', config.colors.textColor);
            root.style.setProperty('--float-duration', config.animations.floatDuration);
            root.style.setProperty('--float-distance', config.animations.floatDistance);
            root.style.setProperty('--bounce-speed', config.animations.bounceSpeed);
            root.style.setProperty('--heart-explosion-size', config.animations.heartExplosionSize);
        }

        // ========== MAIN SCRIPT ==========
        const config = window.VALENTINE_CONFIG;

        function validateConfig() {
            const warnings = [];
            if (!config.valentineName) {
                warnings.push("Valentine's name is not set! Using default.");
                config.valentineName = "My Love";
            }
            const isValidHex = (hex) => /^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$/.test(hex);
            Object.entries(config.colors).forEach(([key, value]) => {
                if (!isValidHex(value)) {
                    warnings.push(`Invalid color for ${key}! Using default.`);
                    config.colors[key] = getDefaultColor(key);
                }
            });
            if (parseFloat(config.animations.floatDuration) < 5) {
                warnings.push("Float duration too short! Setting to 5s minimum.");
                config.animations.floatDuration = "5s";
            }
            if (config.animations.heartExplosionSize < 1 || config.animations.heartExplosionSize > 3) {
                warnings.push("Heart explosion size should be between 1 and 3! Using default.");
                config.animations.heartExplosionSize = 1.5;
            }
            if (warnings.length > 0) {
                console.warn("⚠️ Configuration Warnings:");
                warnings.forEach(warning => console.warn("- " + warning));
            }
        }

        function getDefaultColor(key) {
            const defaults = {
                backgroundStart: "#ffafbd",
                backgroundEnd: "#ffc3a0",
                buttonBackground: "#ff6b6b",
                buttonHover: "#ff8787",
                textColor: "#ff4757"
            };
            return defaults[key];
        }

        document.title = config.pageTitle;

        function setInitialTexts() {
            document.getElementById('valentineTitle').textContent = `${config.valentineName}, my love...`;
            document.getElementById('question1Text').textContent = config.questions.first.text;
            document.getElementById('yesBtn1').textContent = config.questions.first.yesBtn;
            document.getElementById('noBtn1').textContent = config.questions.first.noBtn;
            document.getElementById('secretAnswerBtn').textContent = config.questions.first.secretAnswer;
            document.getElementById('question2Text').textContent = config.questions.second.text;
            document.getElementById('startText').textContent = config.questions.second.startText;
            document.getElementById('nextBtn').textContent = config.questions.second.nextBtn;
            document.getElementById('question3Text').textContent = config.questions.third.text;
            document.getElementById('yesBtn3').textContent = config.questions.third.yesBtn;
            document.getElementById('noBtn3').textContent = config.questions.third.noBtn;
        }

        function createFloatingElements() {
            const container = document.querySelector('.floating-elements');
            config.floatingEmojis.hearts.forEach(heart => {
                const div = document.createElement('div');
                div.className = 'heart';
                div.innerHTML = heart;
                setRandomPosition(div);
                container.appendChild(div);
            });
            config.floatingEmojis.bears.forEach(bear => {
                const div = document.createElement('div');
                div.className = 'bear';
                div.innerHTML = bear;
                setRandomPosition(div);
                container.appendChild(div);
            });
        }

        function setRandomPosition(element) {
            element.style.left = Math.random() * 100 + 'vw';
            element.style.animationDelay = Math.random() * 5 + 's';
            element.style.animationDuration = 10 + Math.random() * 20 + 's';
        }

        function showNextQuestion(questionNumber) {
            document.querySelectorAll('.question-section').forEach(q => q.classList.add('hidden'));
            document.getElementById(`question${questionNumber}`).classList.remove('hidden');
        }

        function moveButton(button) {
            const x = Math.random() * (window.innerWidth - button.offsetWidth);
            const y = Math.random() * (window.innerHeight - button.offsetHeight);
            button.style.position = 'fixed';
            button.style.left = x + 'px';
            button.style.top = y + 'px';
        }

        function setupLoveMeter() {
            const loveMeter = document.getElementById('loveMeter');
            const loveValueSpan = document.getElementById('loveValue');
            const extraLoveSpan = document.getElementById('extraLove');
            
            function setInitialPosition() {
                loveMeter.value = 100;
                loveValueSpan.textContent = 100;
            }
            setInitialPosition();
            
            loveMeter.addEventListener('input', () => {
                const value = parseInt(loveMeter.value);
                loveValueSpan.textContent = value;
                if (value > 100) {
                    extraLoveSpan.classList.remove('hidden');
                    if (value >= 5000) {
                        extraLoveSpan.textContent = config.loveMessages.extreme;
                        extraLoveSpan.classList.add('super-love');
                    } else if (value > 1000) {
                        extraLoveSpan.textContent = config.loveMessages.high;
                        extraLoveSpan.classList.remove('super-love');
                    } else {
                        extraLoveSpan.textContent = config.loveMessages.normal;
                        extraLoveSpan.classList.remove('super-love');
                    }
                } else {
                    extraLoveSpan.classList.add('hidden');
                }
            });
        }

        function setupMusic() {
            if (!config.music.enabled) {
                document.getElementById('musicControls').style.display = 'none';
                return;
            }
            const musicToggle = document.getElementById('musicToggle');
            const bgMusic = document.getElementById('bgMusic');
            const musicSource = document.getElementById('musicSource');
            musicSource.src = config.music.musicUrl;
            bgMusic.volume = config.music.volume;
            bgMusic.load();
            if (config.music.autoplay) {
                bgMusic.play().catch(e => console.log("Autoplay prevented by browser"));
            }
            musicToggle.addEventListener('click', () => {
                if (bgMusic.paused) {
                    bgMusic.play();
                    musicToggle.textContent = config.music.stopText;
                } else {
                    bgMusic.pause();
                    musicToggle.textContent = config.music.startText;
                }
            });
        }

        function celebrate() {
            document.querySelectorAll('.question-section').forEach(q => q.classList.add('hidden'));
            const celebrationDiv = document.getElementById('celebration');
            celebrationDiv.classList.remove('hidden');
            document.getElementById('celebrationTitle').textContent = config.celebration.title;
            document.getElementById('celebrationMessage').textContent = config.celebration.message;
            document.getElementById('celebrationEmojis').textContent = config.celebration.emojis;
            createHeartExplosion();
        }

        function createHeartExplosion() {
            const container = document.querySelector('.floating-elements');
            for (let i = 0; i < 50; i++) {
                const heart = document.createElement('div');
                const randomHeart = config.floatingEmojis.hearts[Math.floor(Math.random() * config.floatingEmojis.hearts.length)];
                heart.innerHTML = randomHeart;
                heart.className = 'heart';
                container.appendChild(heart);
                setRandomPosition(heart);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            validateConfig();
            applyTheme();
            setInitialTexts();
            createFloatingElements();
            setupLoveMeter();
            setupMusic();
        });
    </script>
</body>
</html>
