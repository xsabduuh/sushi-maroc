<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💘 Crazy Love Quiz | Will you marry me? 💘</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating hearts */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-hearts div {
            position: absolute;
            font-size: 24px;
            animation: floatUp linear infinite;
            opacity: 0.5;
            bottom: -60px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.6;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main card */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 248, 245, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 64px;
            max-width: 650px;
            width: 100%;
            padding: 30px 20px 40px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2), 0 0 0 10px #fff0f3, 0 0 0 14px #ffb7c2;
            text-align: center;
            transition: 0.3s;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #d4145a, #ff6f91);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            font-family: 'Dancing Script', cursive;
        }

        h2 {
            color: #b13e5e;
            font-size: 1.6rem;
            margin: 20px 0;
            line-height: 1.3;
        }

        /* Buttons */
        .cute-btn {
            background: linear-gradient(95deg, #ff6685, #ff3b6f);
            border: none;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 8px 10px;
            box-shadow: 0 5px 0 #a12246;
            font-family: inherit;
            display: inline-block;
        }

        .cute-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #a12246;
        }

        .special {
            background: linear-gradient(95deg, #ffb347, #ff8c33);
            box-shadow: 0 5px 0 #b16224;
        }

        .final-yes {
            background: linear-gradient(95deg, #43c6ac, #28a47e);
            box-shadow: 0 5px 0 #1b6e54;
            font-size: 1.3rem;
            padding: 14px 36px;
        }

        .no-btn {
            background: linear-gradient(95deg, #a0a0a0, #707070);
            box-shadow: 0 5px 0 #4a4a4a;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 15px 0;
        }

        /* Sections */
        .question-section {
            margin: 20px 0;
        }

        .hidden {
            display: none;
        }

        /* Love meter */
        .love-meter {
            background: #ffeef2;
            padding: 20px;
            border-radius: 50px;
            margin: 20px 0;
            text-align: center;
        }

        .slider {
            width: 90%;
            margin: 15px 0;
            height: 8px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #ff6b6b, #ffb8b8);
            border-radius: 10px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #ff3b6f;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .love-percentage {
            font-size: 1.3rem;
            font-weight: bold;
            color: #c53a60;
        }

        .extra-love {
            display: block;
            margin-top: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: #ff8c42;
            animation: fadeIn 0.3s;
        }

        .extra-love.super-love {
            color: #d43f1f;
            font-size: 1.2rem;
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Celebration */
        .celebration {
            margin-top: 20px;
        }

        .celebration-text {
            font-size: 1.4rem;
            color: #b13e5e;
            margin: 20px 0;
        }

        .celebration-emoji {
            font-size: 3rem;
            margin: 15px 0;
        }

        /* Secret button */
        .secret-answer {
            margin-top: 20px;
            opacity: 0.65;
            transition: opacity 0.3s;
        }

        .secret-answer:hover {
            opacity: 1;
        }

        #resetBtn {
            margin-top: 20px;
            background: linear-gradient(95deg, #ffaa44, #ff8822);
            box-shadow: 0 5px 0 #aa5511;
        }

        /* Responsive */
        @media (max-width: 550px) {
            .container {
                padding: 20px 15px 30px;
            }
            h1 {
                font-size: 1.8rem;
            }
            h2 {
                font-size: 1.3rem;
            }
            .cute-btn {
                padding: 10px 20px;
                font-size: 1rem;
            }
            .final-yes {
                font-size: 1.1rem;
                padding: 12px 28px;
            }
            .love-percentage {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-hearts"></div>

    <div class="container">
        <h1>💖 Crazy Love Quiz 💖</h1>

        <!-- Question 1 -->
        <div id="question1" class="question-section">
            <h2>Do you love me? 💕</h2>
            <div class="btn-group">
                <button class="cute-btn yes-btn" id="yesBtn1">Yes! Absolutely 💖</button>
                <button class="cute-btn no-btn" id="noBtn1">No 😜</button>
            </div>
            <div class="secret-answer">
                <button class="cute-btn special" id="secretBtn">🤫 Secret answer (skip)</button>
            </div>
        </div>

        <!-- Question 2: Love Meter -->
        <div id="question2" class="question-section hidden">
            <h2>How much do you love me? <br> <span style="font-size:1.2rem;">(0 to 10,000)</span></h2>
            <div class="love-meter">
                <input type="range" id="loveSlider" class="slider" min="0" max="10000" value="100" step="1">
                <div class="love-percentage">
                    <span>❤️ <span id="loveValue">100</span>%</span>
                </div>
                <div id="extraLoveMsg" class="extra-love hidden"></div>
            </div>
            <button class="cute-btn" id="nextBtn">Next ➡️</button>
        </div>

        <!-- Question 3: Proposal -->
        <div id="question3" class="question-section hidden">
            <h2>Will you marry me? 💍</h2>
            <div class="btn-group">
                <button class="cute-btn final-yes" id="yesBtn3">YES! 💒</button>
                <button class="cute-btn no-btn" id="noBtn3">No way 😈</button>
            </div>
        </div>

        <!-- Celebration -->
        <div id="celebration" class="celebration hidden">
            <h2>🎉 YAY! 🎉</h2>
            <p class="celebration-text">You made me the happiest person in the world! 💖</p>
            <div class="celebration-emoji">💍❤️🥂💃🕺🎊</div>
            <button class="cute-btn" id="resetBtn">Start Over 🔄</button>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const CONFIG = {
            loveMessages: {
                normal: "🤔 Hmm... just 'normal'? I'm kidding! 😜",
                high: "💕 Woah! That's a lot of love! I'm blushing 💕",
                extreme: "🔥 INSANE LEVEL! You're crazy about me! I love it! 🔥"
            },
            celebrationMessage: "You said YES! I'm the luckiest person ever! 💖"
        };

        // ========== DOM ELEMENTS ==========
        const floatingContainer = document.querySelector('.floating-hearts');
        const q1 = document.getElementById('question1');
        const q2 = document.getElementById('question2');
        const q3 = document.getElementById('question3');
        const celebrationDiv = document.getElementById('celebration');
        const yesBtn1 = document.getElementById('yesBtn1');
        const noBtn1 = document.getElementById('noBtn1');
        const secretBtn = document.getElementById('secretBtn');
        const nextBtn = document.getElementById('nextBtn');
        const yesBtn3 = document.getElementById('yesBtn3');
        const noBtn3 = document.getElementById('noBtn3');
        const loveSlider = document.getElementById('loveSlider');
        const loveValueSpan = document.getElementById('loveValue');
        const extraLoveMsg = document.getElementById('extraLoveMsg');
        const resetBtn = document.getElementById('resetBtn');

        // ========== FLOATING HEARTS BACKGROUND ==========
        function createFloatingHearts() {
            const hearts = ['❤️', '💖', '💗', '💘', '💝', '💕', '💓'];
            for (let i = 0; i < 45; i++) {
                const heart = document.createElement('div');
                heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                const duration = 8 + Math.random() * 14;
                heart.style.animationDuration = duration + 's';
                heart.style.animationDelay = Math.random() * 12 + 's';
                heart.style.fontSize = 18 + Math.random() * 42 + 'px';
                heart.style.opacity = 0.3 + Math.random() * 0.5;
                floatingContainer.appendChild(heart);
            }
        }
        createFloatingHearts();

        // ========== MOVE BUTTON SAFELY (stays inside viewport) ==========
        function moveButtonSafely(btn) {
            const btnRect = btn.getBoundingClientRect();
            const btnWidth = btnRect.width;
            const btnHeight = btnRect.height;
            const margin = 20;
            const maxX = window.innerWidth - btnWidth - margin;
            const maxY = window.innerHeight - btnHeight - margin;
            const randomX = Math.max(margin, Math.random() * maxX);
            const randomY = Math.max(margin, Math.random() * maxY);
            
            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
            btn.style.zIndex = '1000';
            btn.style.transition = '0.1s ease';
            btn.style.transform = 'scale(1.05)';
            setTimeout(() => { btn.style.transform = ''; }, 200);
        }

        // ========== QUESTION 1 ==========
        noBtn1.addEventListener('click', (e) => {
            e.preventDefault();
            moveButtonSafely(noBtn1);
            const originalText = noBtn1.textContent;
            noBtn1.textContent = "🤪 Can't catch me!";
            setTimeout(() => { noBtn1.textContent = originalText; }, 800);
        });

        yesBtn1.addEventListener('click', () => {
            q1.classList.add('hidden');
            q2.classList.remove('hidden');
            loveSlider.value = 100;
            loveValueSpan.textContent = 100;
            extraLoveMsg.classList.add('hidden');
        });

        secretBtn.addEventListener('click', () => {
            q1.classList.add('hidden');
            q2.classList.remove('hidden');
        });

        // ========== LOVE METER ==========
        loveSlider.addEventListener('input', () => {
            let val = parseInt(loveSlider.value);
            loveValueSpan.textContent = val;
            if (val > 100) {
                extraLoveMsg.classList.remove('hidden');
                if (val >= 5000) {
                    extraLoveMsg.innerHTML = CONFIG.loveMessages.extreme;
                    extraLoveMsg.classList.add('super-love');
                } else if (val > 1000) {
                    extraLoveMsg.innerHTML = CONFIG.loveMessages.high;
                    extraLoveMsg.classList.remove('super-love');
                } else {
                    extraLoveMsg.innerHTML = CONFIG.loveMessages.normal;
                    extraLoveMsg.classList.remove('super-love');
                }
            } else {
                extraLoveMsg.classList.add('hidden');
            }
        });

        nextBtn.addEventListener('click', () => {
            q2.classList.add('hidden');
            q3.classList.remove('hidden');
        });

        // ========== QUESTION 3 ==========
        noBtn3.addEventListener('click', (e) => {
            e.preventDefault();
            moveButtonSafely(noBtn3);
            const originalText = noBtn3.textContent;
            noBtn3.textContent = "😈 Nice try!";
            setTimeout(() => { noBtn3.textContent = originalText; }, 800);
        });

        yesBtn3.addEventListener('click', () => {
            q3.classList.add('hidden');
            celebrationDiv.classList.remove('hidden');
            const celebrationText = document.querySelector('.celebration-text');
            if (celebrationText) celebrationText.innerText = CONFIG.celebrationMessage;
            
            // Heart explosion effect
            for (let i = 0; i < 80; i++) {
                const heart = document.createElement('div');
                heart.innerText = ['❤️', '💖', '💗', '💘', '💝'][Math.floor(Math.random() * 5)];
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * window.innerWidth + 'px';
                heart.style.top = Math.random() * window.innerHeight + 'px';
                heart.style.fontSize = (20 + Math.random() * 50) + 'px';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '9999';
                heart.style.opacity = '0.9';
                heart.style.transition = 'all 0.8s ease-out';
                heart.style.animation = 'floatUp 1s ease-out forwards';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1200);
            }
        });

        // ========== RESET FUNCTION ==========
        function resetGame() {
            celebrationDiv.classList.add('hidden');
            q3.classList.add('hidden');
            q2.classList.add('hidden');
            q1.classList.remove('hidden');
            // Reset moved buttons position
            const allNoBtns = document.querySelectorAll('.no-btn');
            allNoBtns.forEach(btn => {
                btn.style.position = '';
                btn.style.left = '';
                btn.style.top = '';
                btn.style.transform = '';
            });
            loveSlider.value = 100;
            loveValueSpan.textContent = 100;
            extraLoveMsg.classList.add('hidden');
            noBtn1.textContent = "No 😜";
            noBtn3.textContent = "No way 😈";
        }

        resetBtn.addEventListener('click', resetGame);
    </script>
</body>
</html>
