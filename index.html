<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Crazy Love Quiz 💘</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="floating-hearts"></div>

    <div class="container">
        <h1>💖 A Silly Love Quiz 💖</h1>
        
        <!-- Music Toggle (optional) -->
        <div class="music-controls">
            <button id="musicToggle" class="music-btn">🎵 Play Music</button>
            <audio id="bgMusic" loop>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>

        <!-- Question 1 -->
        <div id="question1" class="question-section">
            <h2>Do you love me? ❤️</h2>
            <button class="cute-btn" id="yesBtn1">Yes! 💕</button>
            <button class="cute-btn" id="noBtn1">No 😜</button>
            <div class="secret-answer">
                <button class="cute-btn special" id="secretBtn">🤫 Secret answer</button>
            </div>
        </div>

        <!-- Question 2: Love Meter (crazy) -->
        <div id="question2" class="question-section hidden">
            <h2>How much do you love me? (0 to 10,000) 💘</h2>
            <div class="love-meter">
                <input type="range" id="loveSlider" min="0" max="10000" value="100" class="slider">
                <p>
                    <span class="love-value">❤️ <span id="loveValue">100</span>%</span>
                    <span id="extraLoveMsg" class="extra-love hidden"></span>
                </p>
            </div>
            <button class="cute-btn" id="nextBtn">Next ➡️</button>
        </div>

        <!-- Question 3: Will you marry me? -->
        <div id="question3" class="question-section hidden">
            <h2>Will you marry me? 💍</h2>
            <button class="cute-btn final-yes" id="yesBtn3">YES! 💒</button>
            <button class="cute-btn" id="noBtn3">No way 😈</button>
        </div>

        <!-- Celebration -->
        <div id="celebration" class="celebration hidden">
            <h2>🎉 YAY! 🎉</h2>
            <p class="celebration-text">You made me the happiest person! 💖</p>
            <p class="celebration-emoji">💍❤️🥂💃🕺</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
